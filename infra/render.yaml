services:
  - type: web
    name: abac-proxy
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PROXY_PORT
        value: 8080
      - key: PROXY_ALLOWLIST
        value: /app/config/allowlist.json
      - key: PROXY_POLICY_STORE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: abac-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: abac-redis
          type: redis
          property: connectionString
      - key: POLICY_CACHE_TTL
        value: 300
      - key: POLICY_RELOAD_INTERVAL
        value: 30
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: abac-admin-api
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile.admin
    dockerContext: .
    envVars:
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: abac-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: abac-redis
          type: redis
          property: connectionString
      - key: ADMIN_API_KEY
        generateValue: true
      - key: ENABLE_POLICY_VALIDATION
        value: true
    healthCheckPath: /health
    autoDeploy: true

  - type: redis
    name: abac-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: abac-db
    region: oregon
    plan: free
    databaseName: abac_production
    user: abac_user
    ipAllowList: []
    postgresMajorVersion: 15

envVarGroups:
  - name: shared-config
    envVars:
      - key: TZ
        value: UTC
      - key: ENVIRONMENT
        value: production
